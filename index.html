<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Editor — Sourav.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface-2: #18181c;
    --surface-3: #222228;
    --border: #2a2a32;
    --border-focus: #1C86FF;
    --text: #e8e8ed;
    --text-dim: #7a7a88;
    --accent-blue: #1C86FF;
    --accent-teal: #5ADDCF;
    --radius: 10px;
  }

  html { font-size: 14px; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Ambient glow ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 60%; height: 80%;
    background: radial-gradient(ellipse, rgba(28,134,255,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 50%; height: 70%;
    background: radial-gradient(ellipse, rgba(90,221,207,.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(10,10,12,.7);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: -.3px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
    display: grid; place-items: center;
    font-size: .75rem; font-weight: 700; color: #000;
  }
  .logo span { color: var(--text-dim); font-weight: 400; margin-left: 2px; }

  .header-hint {
    font-size: .8rem;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .header-hint kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'Poppins', sans-serif;
    font-size: .7rem;
  }

  .workspace {
    display: grid;
    grid-template-columns: 380px 1fr;
    flex: 1;
  }

  /* ── Panel (left) ── */
  .panel {
    border-right: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 57px);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-label {
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea, input[type="text"], input[type="number"] {
    font-family: 'Poppins', sans-serif;
    font-size: .9rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }
  textarea:focus, input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(28,134,255,.12);
  }
  textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }
  textarea::placeholder { color: var(--text-dim); opacity: .6; }

  .hint {
    font-size: .75rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .hint code {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: 'Poppins', monospace;
    font-size: .7rem;
    color: var(--accent-teal);
  }

  /* ── Control row ── */
  .control-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .control-group label {
    font-size: .72rem;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: .3px;
  }

  /* ── Alignment buttons ── */
  .align-btns {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .align-btn {
    flex: 1;
    background: var(--surface);
    border: none;
    color: var(--text-dim);
    padding: 8px 0;
    cursor: pointer;
    transition: all .15s;
    display: grid;
    place-items: center;
    font-size: 0;
  }
  .align-btn + .align-btn { border-left: 1px solid var(--border); }
  .align-btn:hover { background: var(--surface-2); color: var(--text); }
  .align-btn.active {
    background: var(--accent-blue);
    color: #fff;
  }
  .align-btn svg { width: 16px; height: 16px; }

  /* ── Font size input ── */
  input[type="number"] {
    -moz-appearance: textfield;
    width: 100%;
  }
  input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

  /* ── Separator ── */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Export buttons ── */
  .export-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .export-btn {
    font-family: 'Poppins', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    padding: 10px 0;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .export-btn:hover {
    border-color: var(--accent-blue);
    background: var(--surface-2);
  }
  .export-btn.primary {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
    border-color: transparent;
    color: #000;
  }
  .export-btn.primary:hover {
    opacity: .9;
  }
  .export-btn svg { width: 14px; height: 14px; }

  /* ── Preview area (right) ── */
  .preview-area {
    display: grid;
    place-items: center;
    padding: 40px;
    background:
      radial-gradient(circle at 50% 50%, rgba(28,134,255,.03) 0%, transparent 50%),
      repeating-conic-gradient(var(--surface) 0% 25%, var(--bg) 0% 50%) 0 0 / 24px 24px;
    overflow: auto;
    max-height: calc(100vh - 57px);
  }

  .preview-wrapper {
    position: relative;
  }
  .preview-wrapper::after {
    content: '';
    position: absolute;
    inset: -40px;
    border-radius: 40px;
    background: radial-gradient(ellipse, rgba(28,134,255,.08), transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  #preview-canvas {
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .workspace {
      grid-template-columns: 1fr;
    }
    .panel {
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .preview-area {
      max-height: none;
      min-height: 500px;
    }
  }

  /* ── Scrollbar ── */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">S</div>
      Card Editor <span>v1.0</span>
    </div>
    <div class="header-hint">
      Wrap text in <kbd>**</kbd> for gradient &nbsp;·&nbsp; New line = new row
    </div>
  </header>

  <div class="workspace">

    <!-- ── Left Panel ── -->
    <div class="panel">

      <!-- Text blocks -->
      <div class="panel-section">
        <div class="panel-label">Content</div>
        <textarea id="block1" spellcheck="false">Great **code reviews** do
more than find bugs

They build better devs.</textarea>
        <div class="hint">Each line becomes a separate row. Use <code>**text**</code> for gradient highlight.</div>
      </div>

      <div class="sep"></div>

      <!-- Controls -->
      <div class="panel-section">
        <div class="panel-label">Typography</div>
        <div class="control-row">
          <div class="control-group">
            <label>Alignment</label>
            <div class="align-btns">
              <button class="align-btn" data-align="left" title="Left">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="2" y1="7" x2="10" y2="7"/><line x1="2" y1="11" x2="14" y2="11"/><line x1="2" y1="15" x2="8" y2="15"/></svg>
              </button>
              <button class="align-btn" data-align="center" title="Center">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="1" y1="3" x2="15" y2="3"/><line x1="3" y1="7" x2="13" y2="7"/><line x1="1" y1="11" x2="15" y2="11"/><line x1="4" y1="15" x2="12" y2="15"/></svg>
              </button>
              <button class="align-btn" data-align="right" title="Right">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="2" y1="11" x2="14" y2="11"/><line x1="8" y1="15" x2="14" y2="15"/></svg>
              </button>
            </div>
          </div>
          <div class="control-group">
            <label>Font Size (px)</label>
            <input type="number" id="fontSize" value="36" min="12" max="72" step="1">
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <!-- Footer info -->
      <div class="panel-section">
        <div class="panel-label">Author Info</div>
        <div class="control-row">
          <div class="control-group">
            <label>Name</label>
            <input type="text" id="authorName" value="Sourav Dey">
          </div>
        </div>
        <div class="control-group">
          <label>URL</label>
          <input type="text" id="authorUrl" value="https://www.Souravdey.Space">
        </div>
      </div>

      <div class="sep"></div>

      <!-- Export -->
      <div class="panel-section">
        <div class="panel-label">Export</div>
        <div class="export-grid">
          <button class="export-btn primary" onclick="downloadImage('png')">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5l-3.5-3.5h2.5v-5h2v5h2.5zM2 12h12v2H2z"/></svg>
            PNG
          </button>
          <button class="export-btn" onclick="downloadImage('jpg')">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5l-3.5-3.5h2.5v-5h2v5h2.5zM2 12h12v2H2z"/></svg>
            JPG
          </button>
          <button class="export-btn" onclick="downloadSVG()">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5l-3.5-3.5h2.5v-5h2v5h2.5zM2 12h12v2H2z"/></svg>
            SVG
          </button>
        </div>
      </div>

    </div>

    <!-- ── Preview Area ── -->
    <div class="preview-area">
      <div class="preview-wrapper">
        <canvas id="preview-canvas" width="720" height="720"></canvas>
      </div>
    </div>

  </div>
</div>

// ── Parse **gradient** syntax ──
function parseSegments(text) {
  const regex = /\*\*(.+?)\*\*/g;
  const segments = [];
  let last = 0;
  let m;
  while ((m = regex.exec(text)) !== null) {
    if (m.index > last) segments.push({ text: text.slice(last, m.index), gradient: false });
    segments.push({ text: m[1], gradient: true });
    last = m.index + m[0].length;
  }
  if (last < text.length) segments.push({ text: text.slice(last), gradient: false });
  return segments;
}

// ── Create gradient for text ──
function makeTextGradient(x, y, width) {
  const g = ctx.createLinearGradient(x + width, y, x, y);
  g.addColorStop(0.1704, '#5ADDCF');
  g.addColorStop(0.7374, '#1C86FF');
  return g;
}

// ── Measure segments width ──
function measureSegments(segments, font) {
  ctx.font = font;
  return segments.reduce((w, s) => w + ctx.measureText(s.text).width, 0);
}

// ── Draw segments ──
function drawSegments(segments, x, y, font) {
  ctx.font = font;
  let cx = x;
  for (const seg of segments) {
    const w = ctx.measureText(seg.text).width;
    if (seg.gradient) {
      ctx.fillStyle = makeTextGradient(cx, y - state.fontSize * 0.7, w);
    } else {
      ctx.fillStyle = '#FFFFFF';
    }
    ctx.fillText(seg.text, cx, y);
    cx += w;
  }
}

// ── Get X for alignment ──
function getX(lineWidth) {
  const pad = 59; // inner card padding from x=119
  const cardLeft = 60;
  const cardWidth = 600;
  const innerLeft = cardLeft + pad;
  const innerRight = cardLeft + cardWidth - pad;
  const innerWidth = innerRight - innerLeft;

  if (state.align === 'left') return innerLeft;
  if (state.align === 'center') return innerLeft + (innerWidth - lineWidth) / 2;
  return innerRight - lineWidth;
}

// ── Render preview ──
function render() {
  renderToCtx(ctx, null);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Export PNG / JPG ──
function downloadImage(format) {
  // Render onto a clean offscreen canvas so CORS never blocks toDataURL
  const offscreen = document.createElement('canvas');
  offscreen.width = W;
  offscreen.height = H;
  const octx = offscreen.getContext('2d');
  renderToCtx(octx, () => {
    const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
    const dataUrl = offscreen.toDataURL(mime, 0.95);
    const link = document.createElement('a');
    link.download = `card.${format}`;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
}

// ── Shared render function that works on any context ──
function renderToCtx(c, callback) {
  c.clearRect(0, 0, W, H);

  const fs = state.fontSize;
  const lineHeight = fs * 1.2;
  const font = `600 ${fs}px Poppins, sans-serif`;

  // BG gradient
  const bgGrad = c.createLinearGradient(0, H, 0, 0);
  bgGrad.addColorStop(0.3769, '#1C86FF');
  bgGrad.addColorStop(0.9463, '#5ADDCF');
  c.fillStyle = bgGrad;
  c.fillRect(0, 0, W, H);

  // Card shadow
  c.save();
  c.shadowColor = 'rgba(0,0,0,0.50)';
  c.shadowBlur = 50;
  c.beginPath();
  roundRect(c, 60, 60, 600, 600, 16);
  c.fillStyle = '#000000';
  c.fill();
  c.restore();

  // Card
  c.beginPath();
  roundRect(c, 60, 60, 600, 600, 16);
  c.fillStyle = '#000000';
  c.fill();

  // Text
  const lines = state.block1.split('\n');
  const totalTextHeight = lines.length * lineHeight;
  const contentTop = 60;
  const contentBottom = 555;
  const contentHeight = contentBottom - contentTop;
  const startY = contentTop + (contentHeight - totalTextHeight) / 2 + fs * 0.7;

  lines.forEach((line, i) => {
    const segs = parseSegments(line);
    c.font = font;
    const w = segs.reduce((acc, s) => acc + c.measureText(s.text).width, 0);
    const x = getX(w);
    let cx = x;
    for (const seg of segs) {
      c.font = font;
      const sw = c.measureText(seg.text).width;
      if (seg.gradient) {
        const g = c.createLinearGradient(cx + sw, startY + i * lineHeight, cx, startY + i * lineHeight);
        g.addColorStop(0.1704, '#5ADDCF');
        g.addColorStop(0.7374, '#1C86FF');
        c.fillStyle = g;
      } else {
        c.fillStyle = '#FFFFFF';
      }
      c.fillText(seg.text, cx, startY + i * lineHeight);
      cx += sw;
    }
  });

  // Divider
  const divGrad = c.createLinearGradient(119, 0, 602, 0);
  divGrad.addColorStop(0, '#1C86FF');
  divGrad.addColorStop(1, '#5ADDCF');
  c.fillStyle = divGrad;
  c.fillRect(119, 555, 483, 2);

  // Author name
  c.font = '600 16px Poppins, sans-serif';
  c.fillStyle = '#FFFFFF';
  c.fillText(state.authorName, 172, 594);

  // URL
  c.font = '400 13px Poppins, sans-serif';
  c.fillStyle = '#bbbbbb';
  c.fillText(state.authorUrl, 172, 614);

  // Avatar — always available as embedded data URL, no CORS issues
  if (avatarImg.complete && avatarImg.naturalWidth > 0) {
    c.save();
    c.beginPath();
    c.arc(140, 600, 21, 0, Math.PI * 2);
    c.closePath();
    c.clip();
    c.drawImage(avatarImg, 119, 579, 42, 42);
    c.restore();
  }
  callback && callback();
}

// ── Export SVG ──
function downloadSVG() {
  const fs = state.fontSize;
  const lineHeight = fs * 1.2;
  const font = `600 ${fs}px Poppins, sans-serif`;

  const lines = state.block1.split('\n');
  const totalTextHeight = lines.length * lineHeight;
  const contentTop = 60;
  const contentBottom = 555;
  const contentHeight = contentBottom - contentTop;
  const startY = contentTop + (contentHeight - totalTextHeight) / 2 + fs * 0.7;

  // We need to measure text widths with canvas for alignment
  ctx.font = font;

  let textAnchor = 'start';
  if (state.align === 'center') textAnchor = 'middle';
  if (state.align === 'right') textAnchor = 'end';

  function getAlignX(lineWidth) {
    const innerLeft = 119;
    const innerRight = 602;
    const innerWidth = innerRight - innerLeft;
    if (state.align === 'left') return innerLeft;
    if (state.align === 'center') return innerLeft + innerWidth / 2;
    return innerRight;
  }

  function buildTextElements(lines, baseY) {
    let elems = '';
    lines.forEach((line, i) => {
      const segs = parseSegments(line);
      const y = baseY + i * lineHeight;
      // For SVG with text-anchor, we use a single x
      const x = getAlignX();

      let inner = '';
      segs.forEach(seg => {
        if (seg.gradient) {
          inner += `<tspan fill="url(#text-grad)">${escXml(seg.text)}</tspan>`;
        } else {
          inner += escXml(seg.text);
        }
      });

      elems += `  <text x="${x}" y="${y}" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="${fs}" fill="#FFFFFF" letter-spacing="-0.3" text-anchor="${textAnchor}">${inner}</text>\n`;
    });
    return elems;
  }

  function escXml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Author anchor for SVG is always left
  const svg = `<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg-grad" gradientTransform="rotate(-90, 0.5, 0.5)" x1="0" y1="0" x2="1" y2="0">
      <stop offset="37.69%" stop-color="#1C86FF"/>
      <stop offset="94.63%" stop-color="#5ADDCF"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1C86FF"/>
      <stop offset="100%" stop-color="#5ADDCF"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="17.04%" stop-color="#5ADDCF"/>
      <stop offset="73.74%" stop-color="#1C86FF"/>
    </linearGradient>
    <clipPath id="avatar-clip">
      <circle cx="140" cy="600" r="21"/>
    </clipPath>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="25" flood-color="rgba(0,0,0,0.50)"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="720" height="720" fill="url(#bg-grad)"/>
  <rect x="60" y="60" width="600" height="600" rx="16" fill="#000" filter="url(#card-shadow)"/>
${buildTextElements(lines, startY)}  <rect x="119" y="555" width="483" height="2" rx="1" fill="url(#line-grad)"/>
  <image xlink:href="${AVATAR_DATA_URL}" x="119" y="579" width="42" height="42" clip-path="url(#avatar-clip)"/>
  <text x="172" y="594" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="16" fill="#FFFFFF">${escXml(state.authorName)}</text>
  <text x="172" y="614" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#bbbbbb">${escXml(state.authorUrl)}</text>
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'card.svg';
  link.href = url;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// Initial render
render();
</script>
