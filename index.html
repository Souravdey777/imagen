<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Studio — Sourav Dey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070a;--s1:#0c0c11;--s2:#131318;--s3:#1a1a22;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.09);
  --bf:#1C86FF;--t:#eaeaf0;--td:#6e6e80;--t3:#4a4a58;
  --blue:#1C86FF;--teal:#5ADDCF;--r:12px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:14px}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}

/* ── Ambient orbs ── */
.orb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px)}
.orb-1{top:-18%;left:-8%;width:420px;height:420px;background:rgba(28,134,255,.06);animation:drift 20s ease-in-out infinite alternate}
.orb-2{bottom:-12%;right:-5%;width:360px;height:360px;background:rgba(90,221,207,.045);animation:drift 24s ease-in-out infinite alternate-reverse}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}

/* ── App shell ── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;
  border-bottom:1px solid var(--b);
  backdrop-filter:blur(20px) saturate(1.4);
  background:rgba(7,7,10,.72);
  position:sticky;top:0;z-index:10;
  animation:fadeDown .5s var(--ease) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:1rem;letter-spacing:-.2px}
.logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:var(--blue);
  display:grid;place-items:center;
  font-size:.82rem;line-height:1;
  box-shadow:0 2px 12px rgba(28,134,255,.25);
}
.logo a{color:var(--teal);text-decoration:none;transition:opacity .2s}
.logo a:hover{opacity:.8}
.logo .by{color:var(--td);font-weight:400;font-size:.82rem;margin-left:1px}

.hint-pills{display:flex;gap:6px;align-items:center}
.pill{
  background:var(--s2);border:1px solid var(--b);border-radius:20px;
  padding:3px 10px;font-size:.68rem;color:var(--td);
  display:flex;align-items:center;gap:4px;
  transition:border-color .2s;
}
.pill:hover{border-color:var(--b2)}
.pill code{color:var(--teal);font-family:'Poppins',sans-serif;font-weight:600;font-size:.66rem}

/* ── Workspace ── */
.workspace{display:grid;grid-template-columns:370px 1fr;flex:1}

/* ── Panel ── */
.panel{
  border-right:1px solid var(--b);padding:22px 20px;
  overflow-y:auto;max-height:calc(100vh - 52px);
  display:flex;flex-direction:column;gap:20px;
  animation:slideIn .5s var(--ease) .1s both;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.section{display:flex;flex-direction:column;gap:8px}
.lbl{
  font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);
  display:flex;align-items:center;gap:8px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--b)}

/* ── Inputs ── */
textarea,input[type="text"],input[type="number"]{
  font-family:'Poppins',sans-serif;font-size:.84rem;color:var(--t);
  background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  padding:10px 14px;outline:none;width:100%;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s;
}
textarea:focus,input:focus{
  border-color:rgba(28,134,255,.4);
  box-shadow:0 0 0 3px rgba(28,134,255,.08),0 1px 3px rgba(0,0,0,.2);
  background:var(--s2);
}
textarea{resize:vertical;min-height:136px;line-height:1.7}
textarea::placeholder{color:var(--td);opacity:.5}

.sub{font-size:.68rem;color:var(--td);line-height:1.5}
.sub code{
  background:rgba(90,221,207,.08);border:1px solid rgba(90,221,207,.12);
  border-radius:4px;padding:1px 5px;font-size:.64rem;color:var(--teal);
  font-family:'Poppins',sans-serif;font-weight:500;
}

.row{display:flex;gap:10px;align-items:stretch}
.col{display:flex;flex-direction:column;gap:5px;flex:1}
.col label{font-size:.66rem;font-weight:500;color:var(--td);letter-spacing:.2px}

/* ── Alignment ── */
.align-group{display:flex;border:1px solid var(--b);border-radius:var(--r);overflow:hidden;align-self:stretch}
.align-group button{
  flex:1;background:var(--s1);border:none;color:var(--td);
  padding:12px 0;cursor:pointer;display:grid;place-items:center;
  transition:all .2s var(--ease);
}
.align-group button+button{border-left:1px solid var(--b)}
.align-group button:hover{background:var(--s2);color:var(--t)}
.align-group button.on{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(28,134,255,.3)}
.align-group svg{width:14px;height:14px}

input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button{opacity:1}

.sep{height:1px;background:var(--b);margin:2px 0}

/* ── Export ── */
.export-wrap{display:flex;gap:8px;position:relative}
.ex-main{
  flex:1;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:600;
  padding:11px 0;border:none;border-radius:var(--r);
  background:var(--blue);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s var(--ease);
}
.ex-main:hover{background:#1a7aee;box-shadow:0 4px 16px rgba(28,134,255,.3)}
.ex-main:active{transform:scale(.98)}
.ex-dropdown{position:relative;width:80px}
.ex-dd-btn{
  font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600;
  width:100%;padding:11px 0;border:1px solid var(--b);
  border-radius:var(--r);
  background:var(--bg);color:var(--t);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s var(--ease);
}
.ex-dd-btn:hover{border-color:var(--b2);background:var(--s1)}
.ex-dd-menu{
  position:absolute;top:calc(100% + 6px);right:0;width:80px;
  background:var(--bg);border:1px solid var(--b2);border-radius:8px;
  padding:4px;box-shadow:0 8px 32px rgba(0,0,0,.6);
  opacity:0;transform:translateY(-4px);pointer-events:none;
  transition:all .2s var(--ease);z-index:20;
}
.ex-dd-menu.open{opacity:1;transform:translateY(0);pointer-events:auto}
.ex-dd-item{
  font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:500;
  padding:7px 12px;border-radius:6px;cursor:pointer;color:var(--td);
  transition:all .15s;text-align:center;
}
.ex-dd-item:hover{background:var(--s2);color:var(--t)}
.ex-dd-item.active{color:var(--blue);font-weight:600}

/* ── Preview ── */
.preview{
  display:grid;place-items:center;padding:36px;
  overflow:auto;max-height:calc(100vh - 52px);
  background:
    radial-gradient(circle at 50% 45%,rgba(28,134,255,.025) 0%,transparent 50%),
    repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%,transparent 0% 50%) 0 0/22px 22px;
  animation:fadeIn .6s var(--ease) .2s both;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.preview-wrap{position:relative}
.preview-wrap::before{
  content:'';position:absolute;inset:-60px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(28,134,255,.06),transparent 60%);
  pointer-events:none;z-index:-1;
  animation:pulse 6s ease-in-out infinite alternate;
}
@keyframes pulse{0%{opacity:.6;transform:scale(.95)}100%{opacity:1;transform:scale(1.05)}}

canvas{
  border-radius:6px;
  box-shadow:
    0 2px 4px rgba(0,0,0,.1),
    0 8px 24px rgba(0,0,0,.2),
    0 32px 72px rgba(0,0,0,.35),
    0 0 0 1px rgba(255,255,255,.03);
  transition:box-shadow .3s;
}
canvas:hover{
  box-shadow:
    0 2px 4px rgba(0,0,0,.1),
    0 12px 32px rgba(0,0,0,.25),
    0 40px 80px rgba(0,0,0,.4),
    0 0 0 1px rgba(255,255,255,.05);
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px) scale(.96);
  background:var(--s3);border:1px solid var(--b2);border-radius:10px;
  padding:10px 22px;font-size:.78rem;font-weight:500;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:all .4s var(--ease);pointer-events:none;z-index:99;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.toast .check{color:var(--teal)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* ── Responsive ── */
@media(max-width:900px){
  .workspace{grid-template-columns:1fr}
  .panel{max-height:none;border-right:none;border-bottom:1px solid var(--b)}
  .preview{max-height:none;min-height:460px}
  .hint-pills{display:none}
}
@media(max-width:480px){
  header{padding:0 16px}
  .panel{padding:16px}
  .preview{padding:20px}
}
</style>
</head>

  <header>
    <div class="logo">
      <div class="logo-mark">✨</div>

    <div class="hint-pills">
      <div class="pill"><code>**text**</code> gradient</div>

    <div class="panel">

              <button data-v="center" title="Center"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="1" y1="3" x2="15" y2="3"/><line x1="3" y1="7" x2="13" y2="7"/><line x1="1" y1="11" x2="15" y2="11"/><line x1="4" y1="15" x2="12" y2="15"/></svg></button>

            </div>
          </div>
          <div class="col">
            <label>Font size</label>
            <input type="number" id="fontSize" value="36" min="14" max="64" step="1">
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <div class="section">
        <div class="lbl">Author</div>
        <div class="col"><label>Name</label><input type="text" id="authorName" value="Sourav Dey"></div>
        <div class="col"><label>Website</label><input type="text" id="authorUrl" value="https://www.Souravdey.Space"></div>
      </div>

      <div class="sep"></div>

      <div class="section">
        <div class="lbl">Export</div>
        <div class="export-wrap">
          <button class="ex-main" id="exportBtn" onclick="download()">
            <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 10.5l-3.5-3.5h2.5v-5h2v5h2.5zM2 12h12v2H2z"/></svg>
            <span>Export</span>
          </button>
          <div class="ex-dropdown" id="fmtDrop">
            <button class="ex-dd-btn active" id="fmtBtn" onclick="toggleDrop(event)">
              <span id="fmtLabel">JPG</span>
              <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 4.5 6 7.5 9 4.5"/></svg>
            </button>
            <div class="ex-dd-menu" id="fmtMenu">
              <div class="ex-dd-item active" data-fmt="jpg">JPG</div>
              <div class="ex-dd-item" data-fmt="png">PNG</div>
              <div class="ex-dd-item" data-fmt="svg">SVG</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="preview">
      <div class="preview-wrap"><canvas id="cv" width="720" height="720"></canvas></div>
    </div>
  </div>
</div>

const $=id=>document.getElementById(id);
const canvas=$('cv'),ctx=canvas.getContext('2d');

const state={text:$('content').value,align:'left',fontSize:36,name:'Sourav Dey',url:'https://www.Souravdey.Space'};

// Avatar
const avatar=new Image();
avatar.onload=render;
avatar.src=AVATAR;

// Fonts
Promise.all([
  new FontFace('Poppins','url(https://fonts.gstatic.com/s/poppins/v21/pxiEyp8kv8JHgFVrJJfecg.woff2)',{weight:'400'}).load(),
  new FontFace('Poppins','url(https://fonts.gstatic.com/s/poppins/v21/pxiByp8kv8JHgFVrLEj6Z1xlEA.woff2)',{weight:'600'}).load(),
]).then(ff=>{ff.forEach(f=>document.fonts.add(f));render()});

// Parse **gradient**
function parse(t){
  const r=/\*\*(.+?)\*\*/g,o=[];let l=0,m;
  while((m=r.exec(t))!==null){
    if(m.index>l)o.push({t:t.slice(l,m.index),g:0});
    o.push({t:m[1],g:1});l=m.index+m[0].length;
  }
  if(l<t.length)o.push({t:t.slice(l),g:0});
  return o;
}

function alignX(lw){
  const L=CARD.x+CARD.pad,R=CARD.x+CARD.w-CARD.pad,inner=R-L;
  return state.align==='left'?L:state.align==='center'?L+(inner-lw)/2:R-lw;
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function draw(c){
  c.clearRect(0,0,W,H);
  const fs=state.fontSize,lh=fs*1.2,font=`600 ${fs}px Poppins,sans-serif`;

  // BG
  const bg=c.createLinearGradient(0,H,0,0);
  bg.addColorStop(.377,C.blue);bg.addColorStop(.946,C.teal);
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Card shadow
  c.save();c.shadowColor='rgba(0,0,0,.5)';c.shadowBlur=50;
  rr(c,CARD.x,CARD.y,CARD.w,CARD.h,CARD.r);c.fillStyle=C.card;c.fill();c.restore();

  // Card
  rr(c,CARD.x,CARD.y,CARD.w,CARD.h,CARD.r);c.fillStyle=C.card;c.fill();

  // Text
  const raw=state.text.split('\n'),totalH=raw.length*lh;
  const area=FOOTER.divY-CARD.y;
  const sy=CARD.y+(area-totalH)/2+fs*.7;

  c.font=font;
  raw.forEach((line,i)=>{
    if(!line.trim())return;
    const segs=parse(line);
    const w=segs.reduce((a,s)=>a+c.measureText(s.t).width,0);
    let cx=alignX(w);const y=sy+i*lh;
    for(const s of segs){
      const sw=c.measureText(s.t).width;
      if(s.g){const g=c.createLinearGradient(cx+sw,y,cx,y);g.addColorStop(.17,C.teal);g.addColorStop(.74,C.blue);c.fillStyle=g}
      else c.fillStyle=C.w;
      c.fillText(s.t,cx,y);cx+=sw;
    }
  });

  // Divider
  const L=CARD.x+CARD.pad,R=CARD.x+CARD.w-CARD.pad;
  const dg=c.createLinearGradient(L,0,R,0);
  dg.addColorStop(0,C.blue);dg.addColorStop(1,C.teal);
  c.fillStyle=dg;c.fillRect(L,FOOTER.divY,R-L,2);

  // Avatar
  if(avatar.complete&&avatar.naturalWidth){
    c.save();c.beginPath();c.arc(FOOTER.cx,FOOTER.cy,FOOTER.r,0,Math.PI*2);
    c.clip();c.drawImage(avatar,FOOTER.cx-FOOTER.r,FOOTER.cy-FOOTER.r,FOOTER.r*2,FOOTER.r*2);c.restore();
  }

  // Name & URL
  c.font='600 16px Poppins,sans-serif';c.fillStyle=C.w;c.fillText(state.name,FOOTER.tx,FOOTER.ny);
  c.font='400 13px Poppins,sans-serif';c.fillStyle=C.url;c.fillText(state.url,FOOTER.tx,FOOTER.uy);
}

function render(){draw(ctx)}

// Events
$('content').addEventListener('input',e=>{state.text=e.target.value;render()});
$('fontSize').addEventListener('input',e=>{state.fontSize=parseInt(e.target.value)||36;render()});
$('authorName').addEventListener('input',e=>{state.name=e.target.value;render()});
$('authorUrl').addEventListener('input',e=>{state.url=e.target.value;render()});

$('alignGroup').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  $('alignGroup').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');state.align=b.dataset.v;render();
});

// Toast
function toast(msg){
  const el=$('toast');$('toastMsg').textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// Export format state
let exportFmt = 'jpg';

// Dropdown toggle
function toggleDrop(e){
  e.stopPropagation();
  $('fmtMenu').classList.toggle('open');
}

// Dropdown item selection
$('fmtMenu').addEventListener('click',e=>{
  const item=e.target.closest('.ex-dd-item');if(!item)return;
  exportFmt=item.dataset.fmt;
  $('fmtLabel').textContent=exportFmt.toUpperCase();
  $('fmtMenu').querySelectorAll('.ex-dd-item').forEach(x=>x.classList.remove('active'));
  item.classList.add('active');
  $('fmtMenu').classList.remove('open');
});

// Close dropdown on outside click
document.addEventListener('click',()=>$('fmtMenu').classList.remove('open'));

// Export
function download(){
  if(exportFmt==='svg')return downloadSVG();
  const off=document.createElement('canvas');off.width=W;off.height=H;
  draw(off.getContext('2d'));
  const a=document.createElement('a');
  a.download=`card.${exportFmt}`;a.href=off.toDataURL(exportFmt==='jpg'?'image/jpeg':'image/png',.95);
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast(`Exported as ${exportFmt.toUpperCase()}`);
}

function downloadSVG(){
  const fs=state.fontSize,lh=fs*1.2,raw=state.text.split('\n');
  const totalH=raw.length*lh,area=FOOTER.divY-CARD.y;
  const sy=CARD.y+(area-totalH)/2+fs*.7;
  const anchor=state.align==='center'?'middle':state.align==='right'?'end':'start';
  const L=CARD.x+CARD.pad,R=CARD.x+CARD.w-CARD.pad;
  const ax=state.align==='center'?L+(R-L)/2:state.align==='right'?R:L;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  let tEls='';
  raw.forEach((line,i)=>{
    if(!line.trim())return;
    const segs=parse(line);
    const inner=segs.map(s=>s.g?`<tspan fill="url(#tg)">${esc(s.t)}</tspan>`:esc(s.t)).join('');
    tEls+=`  <text x="${ax}" y="${sy+i*lh}" font-family="Poppins,'Helvetica Neue',sans-serif" font-weight="600" font-size="${fs}" fill="#FFF" letter-spacing="-.3" text-anchor="${anchor}">${inner}</text>\n`;
  });

  const svg=`<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" gradientTransform="rotate(-90,.5,.5)" x1="0" y1="0" x2="1" y2="0"><stop offset="37.69%" stop-color="${C.blue}"/><stop offset="94.63%" stop-color="${C.teal}"/></linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${C.blue}"/><stop offset="1" stop-color="${C.teal}"/></linearGradient>
    <linearGradient id="tg" x1="1" y1="0" x2="0" y2="0"><stop offset="17%" stop-color="${C.teal}"/><stop offset="74%" stop-color="${C.blue}"/></linearGradient>
    <clipPath id="ac"><circle cx="${FOOTER.cx}" cy="${FOOTER.cy}" r="${FOOTER.r}"/></clipPath>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="0" stdDeviation="25" flood-color="rgba(0,0,0,.5)"/></filter>
  </defs>
  <rect width="720" height="720" fill="url(#bg)"/>
  <rect x="${CARD.x}" y="${CARD.y}" width="${CARD.w}" height="${CARD.h}" rx="${CARD.r}" fill="#000" filter="url(#sh)"/>
${tEls}  <rect x="${L}" y="${FOOTER.divY}" width="${R-L}" height="2" rx="1" fill="url(#lg)"/>
  <image xlink:href="${AVATAR}" x="${FOOTER.cx-FOOTER.r}" y="${FOOTER.cy-FOOTER.r}" width="${FOOTER.r*2}" height="${FOOTER.r*2}" clip-path="url(#ac)"/>
  <text x="${FOOTER.tx}" y="${FOOTER.ny}" font-family="Poppins,'Helvetica Neue',sans-serif" font-weight="600" font-size="16" fill="#FFF">${esc(state.name)}</text>
  <text x="${FOOTER.tx}" y="${FOOTER.uy}" font-family="Poppins,'Helvetica Neue',sans-serif" font-weight="400" font-size="13" fill="${C.url}">${esc(state.url)}</text>
</svg>`;

  const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.download='card.svg';a.href=url;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),200);
  toast('Exported as SVG');
}

render();
</script>
</body>
</html>
